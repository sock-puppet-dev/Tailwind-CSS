<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Обычный CSS: style в HTML</title>

    <style>
      .button-primary {
        background: blue;
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 16px;
      }
    </style>
  </head>

  <body>
    <button class="button-primary">
      Купить
    </button>
  </body>
</html>
